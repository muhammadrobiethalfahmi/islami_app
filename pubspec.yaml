name: islami_app
description: "A premium, minimalist mobile application designed for the Indonesian Muslim community."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  table_calendar: ^3.1.2
  firebase_core: ^3.15.2
  firebase_auth: ^5.1.2
  flutter_local_notifications: 22.0.0
  flutter_qiblah: ^3.2.0
  geolocator: ^14.0.3
  cloud_firestore: ^5.6.12

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/doa_keseharian.json
    - assets/doa_sholat.json
    - assets/tahlil.json